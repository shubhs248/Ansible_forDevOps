- name: Configure web server with variables, loops, templates and a handler
  hosts: web
  become: true
  vars:
    packages:
      - nginx
      - curl
    listen_port: 8080
  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
        update_cache: true
      loop: "{{ packages }}"

    - name: Deploy the landing page from a template
      ansible.builtin.template:
        src: index.html.j2
        dest: /var/www/html/index.html
        mode: "0644"

    - name: Deploy the nginx site config
      ansible.builtin.template:
        src: nginx-site.conf.j2
        dest: /etc/nginx/conf.d/site.conf
        mode: "0644"
      notify: Restart nginx        # only fires the handler if this file changed

  handlers:
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
