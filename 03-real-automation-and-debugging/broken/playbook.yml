- name: Set up nginx (BROKEN — fix me)
  hosts: web
  # BUG 2: no `become: true`, so installing packages / writing /etc fails with permission denied
  tasks:
    - name: Install nginx
      ansible.builtin.shell: apt install -y nginx    # BUG 3: shell isn't idempotent (changed every run)

    - name: Deploy config
      ansible.builtin.copy:
        dest: /etc/nginx/conf.d/site.conf
        content: "server { listen 8080; }"
       notify: restart nginx                          # BUG 1: indentation off + BUG 4: name mismatch

  handlers:
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
